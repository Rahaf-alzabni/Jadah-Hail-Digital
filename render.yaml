# Full-stack deploy: Django API + React UI on one URL
# https://dashboard.render.com → New Blueprint → connect Rahaf-alzabni/Jadah-Hail-Digital
services:
  - type: web
    name: jadah-hail
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
