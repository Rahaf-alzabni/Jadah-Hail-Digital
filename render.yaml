# Backend API for GitHub Pages frontend
# Deploy on Render.com (free) — connect repo Rahaf-alzabni/Jadah-Hail-Digital
services:
  - type: web
    name: jadah-hail-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py load_demo_data && python manage.py sync_arabic_content && python manage.py load_assistant_data && python manage.py import_hail_images || true
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://rahaf-alzabni.github.io"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://rahaf-alzabni.github.io"
